<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Butler Browser Bridge</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">Single-Tab Bind</p>
        <h1>Butler Chromium Bridge</h1>
        <p class="lede">Connect extension to Butler once; agent-initiated bind requests will be handled in background.</p>
      </header>

      <section class="card">
        <label class="field">
          <span>Rollout mode</span>
          <select id="rollout-mode" name="rollout-mode">
            <option value="remote_preferred" selected>Remote preferred</option>
            <option value="dual">Dual (manual mode choice)</option>
            <option value="native_only">Native only</option>
          </select>
        </label>
        <label class="field">
          <span>Connection mode</span>
          <select id="connection-mode" name="connection-mode">
            <option value="remote" selected>Remote Butler API</option>
            <option value="native">Native host (localhost)</option>
          </select>
        </label>
        <label class="field">
          <span>Remote Butler URL</span>
          <input id="remote-base-url" name="remote-base-url" type="url" autocomplete="off" spellcheck="false" placeholder="https://butler.example.com" />
        </label>
        <label class="field">
          <span>Remote API token</span>
          <input id="remote-api-token" name="remote-api-token" type="password" autocomplete="off" spellcheck="false" placeholder="ext_..." />
        </label>
        <div class="actions">
          <button id="refresh-tabs" type="button" class="ghost">Refresh tabs</button>
          <button id="connect-remote" type="button" class="ghost">Connect relay</button>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Tab candidates</h2>
          <p id="tab-count" class="meta">Loading...</p>
        </div>
        <ul id="tabs-list" class="tabs-list"></ul>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Status</h2>
        </div>
        <pre id="status-panel" class="status-panel">Ready.</pre>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
