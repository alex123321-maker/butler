syntax = "proto3";

package butler.common.v1;

option go_package = "github.com/butler/butler/internal/gen/common/v1;commonv1";

enum RunState {
  RUN_STATE_UNSPECIFIED = 0;
  RUN_STATE_CREATED = 1;
  RUN_STATE_QUEUED = 2;
  RUN_STATE_ACQUIRED = 3;
  RUN_STATE_PREPARING = 4;
  RUN_STATE_MODEL_RUNNING = 5;
  RUN_STATE_TOOL_PENDING = 6;
  RUN_STATE_AWAITING_APPROVAL = 7;
  RUN_STATE_TOOL_RUNNING = 8;
  RUN_STATE_AWAITING_MODEL_RESUME = 9;
  RUN_STATE_FINALIZING = 10;
  RUN_STATE_COMPLETED = 11;
  RUN_STATE_FAILED = 12;
  RUN_STATE_CANCELLED = 13;
  RUN_STATE_TIMED_OUT = 14;
}

enum AutonomyMode {
  AUTONOMY_MODE_UNSPECIFIED = 0;
  AUTONOMY_MODE_0 = 1;
  AUTONOMY_MODE_1 = 2;
  AUTONOMY_MODE_2 = 3;
  AUTONOMY_MODE_3 = 4;
}

enum ErrorClass {
  ERROR_CLASS_UNSPECIFIED = 0;
  ERROR_CLASS_VALIDATION_ERROR = 1;
  ERROR_CLASS_TRANSPORT_ERROR = 2;
  ERROR_CLASS_TOOL_ERROR = 3;
  ERROR_CLASS_POLICY_DENIED = 4;
  ERROR_CLASS_CREDENTIAL_ERROR = 5;
  ERROR_CLASS_APPROVAL_ERROR = 6;
  ERROR_CLASS_TIMEOUT = 7;
  ERROR_CLASS_CANCELLED = 8;
  ERROR_CLASS_INTERNAL_ERROR = 9;
}
