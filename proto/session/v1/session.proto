syntax = "proto3";

package butler.session.v1;

option go_package = "github.com/butler/butler/internal/gen/session/v1;sessionv1";

import "common/v1/types.proto";
import "run/v1/events.proto";

service SessionService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc ResolveSessionKey(ResolveSessionKeyRequest) returns (ResolveSessionKeyResponse);
  rpc AcquireLease(AcquireLeaseRequest) returns (AcquireLeaseResponse);
  rpc ReleaseLease(ReleaseLeaseRequest) returns (ReleaseLeaseResponse);
  rpc CreateRun(CreateRunRequest) returns (CreateRunResponse);
  rpc UpdateRunState(UpdateRunStateRequest) returns (UpdateRunStateResponse);
  rpc GetRun(GetRunRequest) returns (GetRunResponse);
}

message Session {
  string session_id = 1;
  string session_key = 2;
  string user_id = 3;
  string channel = 4;
  string metadata_json = 5;
  string created_at = 6;
  string updated_at = 7;
}

message Lease {
  string lease_id = 1;
  string session_key = 2;
  string run_id = 3;
  string owner_id = 4;
  int64 ttl_seconds = 5;
  string acquired_at = 6;
  string expires_at = 7;
}

message RunRecord {
  string run_id = 1;
  string session_key = 2;
  string input_event_id = 3;
  string status = 4;
  butler.common.v1.AutonomyMode autonomy_mode = 5;
  butler.common.v1.RunState current_state = 6;
  string model_provider = 7;
  string provider_session_ref = 8;
  string lease_id = 9;
  string resumes_run_id = 10;
  string started_at = 11;
  string updated_at = 12;
  string finished_at = 13;
  butler.common.v1.ErrorClass error_type = 14;
  string error_message = 15;
  string metadata_json = 16;
}

message CreateSessionRequest {
  string session_key = 1;
  string user_id = 2;
  string channel = 3;
  string metadata_json = 4;
}

message CreateSessionResponse {
  Session session = 1;
  bool created = 2;
}

message GetSessionRequest {
  string session_key = 1;
}

message GetSessionResponse {
  Session session = 1;
}

message ResolveSessionKeyRequest {
  string channel = 1;
  string external_user_id = 2;
  string external_chat_id = 3;
}

message ResolveSessionKeyResponse {
  string session_key = 1;
}

message AcquireLeaseRequest {
  string session_key = 1;
  string run_id = 2;
  string owner_id = 3;
  int64 ttl_seconds = 4;
}

message AcquireLeaseResponse {
  Lease lease = 1;
}

message ReleaseLeaseRequest {
  string lease_id = 1;
}

message ReleaseLeaseResponse {
  bool released = 1;
}

message CreateRunRequest {
  string session_key = 1;
  butler.run.v1.InputEvent input_event = 2;
  butler.common.v1.AutonomyMode autonomy_mode = 3;
  string model_provider = 4;
  string resumes_run_id = 5;
  string metadata_json = 6;
}

message CreateRunResponse {
  RunRecord run = 1;
}

message UpdateRunStateRequest {
  string run_id = 1;
  butler.common.v1.RunState from_state = 2;
  butler.common.v1.RunState to_state = 3;
  string lease_id = 4;
  butler.common.v1.ErrorClass error_type = 5;
  string error_message = 6;
  string finished_at = 7;
}

message UpdateRunStateResponse {
  RunRecord run = 1;
}

message GetRunRequest {
  string run_id = 1;
}

message GetRunResponse {
  RunRecord run = 1;
}
