services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: butler
      POSTGRES_USER: butler
      POSTGRES_PASSWORD: butler-dev-password
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports: []
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports: []
    networks:
      - backend

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test:
        - CMD
        - ollama
        - list
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports: []
    networks:
      - backend

  tool-http:
    build:
      context: ..
      dockerfile: docker/tool-http/Dockerfile
    restart: unless-stopped
    environment:
      - BUTLER_ENVIRONMENT
      - BUTLER_LOG_LEVEL
      - BUTLER_HTTP_ADDR
      - BUTLER_GRPC_ADDR
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports: []
    networks:
      - backend
      - tool-runtime

  tool-browser:
    build:
      context: ..
      dockerfile: docker/tool-browser/Dockerfile
    restart: unless-stopped
    environment:
      - BUTLER_ENVIRONMENT
      - BUTLER_LOG_LEVEL
      - BUTLER_HTTP_ADDR
      - BUTLER_GRPC_ADDR
      - BUTLER_TOOL_BROWSER_NODE_BINARY
      - BUTLER_TOOL_BROWSER_SCRIPT_PATH
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports: []
    networks:
      - backend
      - tool-runtime

  tool-doctor:
    build:
      context: ..
      dockerfile: docker/tool-doctor/Dockerfile
    restart: unless-stopped
    environment:
      - BUTLER_POSTGRES_URL=postgres://butler:butler-dev-password@postgres:5432/butler?sslmode=disable
      - BUTLER_REDIS_URL=redis://redis:6379/0
      - BUTLER_DOCTOR_CONTAINER_TARGETS=orchestrator=http://orchestrator:8080/health,tool-broker=http://tool-broker:8080/health,tool-browser=http://tool-browser:8080/health,tool-http=http://tool-http:8080/health,tool-doctor=http://tool-doctor:8080/health
      - BUTLER_ENVIRONMENT
      - BUTLER_LOG_LEVEL
      - BUTLER_HTTP_ADDR
      - BUTLER_GRPC_ADDR
      - BUTLER_MODEL_PROVIDER
      - BUTLER_OPENAI_API_KEY
      - BUTLER_OPENAI_BASE_URL
      - BUTLER_OPENAI_MODEL
      - BUTLER_OPENAI_CODEX_MODEL
      - BUTLER_OPENAI_CODEX_BASE_URL
      - BUTLER_GITHUB_COPILOT_MODEL
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports: []
    networks:
      - backend
      - tool-runtime

  tool-broker:
    build:
      context: ..
      dockerfile: docker/tool-broker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      tool-http:
        condition: service_healthy
      tool-browser:
        condition: service_healthy
      tool-doctor:
        condition: service_healthy
    environment:
      - BUTLER_POSTGRES_URL=postgres://butler:butler-dev-password@postgres:5432/butler?sslmode=disable
      - BUTLER_ENVIRONMENT
      - BUTLER_LOG_LEVEL
      - BUTLER_HTTP_ADDR
      - BUTLER_GRPC_ADDR
      - BUTLER_TOOL_REGISTRY_PATH
      - BUTLER_TOOL_DEFAULT_TARGET
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports: []
    networks:
      - backend
      - tool-runtime

  migrator:
    build:
      context: ..
      dockerfile: docker/migrator/Dockerfile
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - BUTLER_POSTGRES_URL=postgres://butler:butler-dev-password@postgres:5432/butler?sslmode=disable
    command:
      - --direction=up
      - --migrations-dir=/app/migrations
    networks:
      - backend

  orchestrator:
    build:
      context: ..
      dockerfile: docker/orchestrator/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      tool-broker:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - BUTLER_POSTGRES_URL=postgres://butler:butler-dev-password@postgres:5432/butler?sslmode=disable
      - BUTLER_REDIS_URL=redis://redis:6379/0
      - BUTLER_TOOL_BROKER_ADDR=tool-broker:9090
      - BUTLER_ENVIRONMENT
      - BUTLER_LOG_LEVEL
      - BUTLER_HTTP_ADDR
      - BUTLER_GRPC_ADDR
      - BUTLER_MODEL_PROVIDER
      - BUTLER_OPENAI_API_KEY
      - BUTLER_OPENAI_MODEL
      - BUTLER_OPENAI_BASE_URL
      - BUTLER_OPENAI_REALTIME_URL
      - BUTLER_OPENAI_TRANSPORT_MODE
      - BUTLER_OPENAI_CODEX_MODEL
      - BUTLER_OPENAI_CODEX_BASE_URL
      - BUTLER_GITHUB_COPILOT_MODEL
      - BUTLER_OPENAI_TIMEOUT_SECONDS
      - BUTLER_TELEGRAM_BOT_TOKEN
      - BUTLER_TELEGRAM_ALLOWED_CHAT_IDS
      - BUTLER_TELEGRAM_BASE_URL
      - BUTLER_TELEGRAM_POLL_TIMEOUT_SECONDS
      - BUTLER_SESSION_LEASE_TTL_SECONDS
      - BUTLER_MEMORY_PROFILE_LIMIT
      - BUTLER_MEMORY_EPISODIC_LIMIT
      - BUTLER_MEMORY_SCOPE_ORDER
      - BUTLER_MEMORY_PIPELINE_ENABLED
      - BUTLER_MEMORY_EXTRACTION_MODEL
      - BUTLER_MEMORY_EMBEDDING_MODEL
      - BUTLER_MEMORY_EMBEDDING_PROVIDER
      - BUTLER_MEMORY_EMBEDDING_DIMENSIONS
      - BUTLER_OLLAMA_URL=http://ollama:11434
      - BUTLER_SETTINGS_ENCRYPTION_KEY
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "8080:8080"
    networks:
      - backend

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
    environment:
      - BUTLER_API_BASE_URL=http://orchestrator:8080
      - NUXT_PUBLIC_API_BASE=http://localhost:8080
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "3000:3000"
    networks:
      - backend

networks:
  backend:
  tool-runtime:
    internal: true

volumes:
  ollama-data:
