services:
  postgres:
    ports:
      - 5432:5432
    volumes:
      - butler-postgres-data:/var/lib/postgresql/data

  redis:
    ports:
      - 6379:6379
    volumes:
      - butler-redis-data:/data

  orchestrator:
    ports:
      - 8080:8080
      - 9090:9090

  tool-broker:
    ports:
      - 10080:8080
      - 10090:9090

  tool-http:
    ports:
      - 11080:8080
      - 11090:9090

  tool-webfetch:
    ports:
      - 11580:8080
      - 11590:9090

  tool-browser:
    ports:
      - 12080:8080
      - 12090:9090

  tool-doctor:
    ports:
      - 13080:8080
      - 13090:9090

volumes:
  butler-postgres-data:
  butler-redis-data:
