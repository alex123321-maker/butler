        why_now: >
          Documentation must stay current with new capabilities per project rules.
        dependencies:
          - T-0808
          - T-0810
        docs_to_read:
          - docs/ai/engineering-rules.md
        acceptance_criteria:
          - .env.example includes BUTLER_SETTINGS_ENCRYPTION_KEY with comment explaining its purpose.
          - Orchestrator README documents settings API endpoints.
          - Config layering behavior (env > db > defaults) is documented.
          - Hot vs cold settings behavior is documented.
          - Secret masking rules are documented.
        deliverables:
