        why_now: >
          This is the primary user-facing deliverable of the sprint.
        dependencies:
          - T-0807
        docs_to_read:
          - docs/architecture/butler-prd-architecture.md
        acceptance_criteria:
          - Settings page loads all config keys from GET /api/v1/settings.
          - Settings are grouped by component with collapsible sections.
          - Each row shows key, masked value, source badge, and validation indicator.
          - Inline edit mode with save/cancel for each setting.
          - Secret fields use password input type with show/hide toggle.
          - Source badges use distinct colors (env=blue, db=green, default=gray).
          - Cold settings show amber restart indicator after successful save.
          - Delete button for DB overrides reverts to env/default.
          - Error toast for validation failures.
          - Loading and empty states are handled.
        deliverables:
          - web/pages/settings.vue (full implementation)
          - web/components/SettingsGroup.vue
          - web/components/SettingRow.vue
          - web/composables/useSettings.ts

      - id: T-0811
        title: Documentation and .env.example updates
        subsystem: docs
        sprint: SPRINT-8
        priority: medium
        status: done
        description: >
          Update .env.example with BUTLER_SETTINGS_ENCRYPTION_KEY. Update orchestrator README
          with settings API documentation. Add operational notes about config layering behavior
